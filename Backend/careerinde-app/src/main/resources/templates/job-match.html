<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        AI Job Match
    </title>

    <style>

        body {

            font-family: Arial;

            background: #f5f5f5;

            padding: 40px;
        }

        .container {

            max-width: 900px;

            margin: auto;
        }

        .card {

            background: white;

            padding: 30px;

            border-radius: 16px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        textarea {

            width: 100%;

            height: 300px;

            padding: 15px;

            border-radius: 10px;

            border: 1px solid #ddd;

            margin-top: 15px;

            font-size: 15px;
        }

        input[type="file"] {

            margin-top: 20px;
        }

        button {

            margin-top: 20px;

            background: black;

            color: white;

            border: none;

            padding: 14px 28px;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            AI Job Match 🚀
        </h1>

        <form action="/job-match"
              method="post"
              enctype="multipart/form-data">

            <label>
                Upload CV
            </label>

            <input type="file"
                   name="file"
                   required>

            <br><br>

            <label>
                Paste Job Description
            </label>

            <textarea
                    name="jobDescription"
                    required>
            </textarea>

            <button type="submit">
                Analyze Match
            </button>

        </form>

    </div>

</div>

</body>

</html>
