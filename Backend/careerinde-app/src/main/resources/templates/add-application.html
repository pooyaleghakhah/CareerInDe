<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        Add Application
    </title>

    <style>

        body {

            font-family: Arial;

            background: #f5f5f5;

            padding: 40px;
        }

        .container {

            max-width: 700px;

            margin: auto;
        }

        .card {

            background: white;

            padding: 35px;

            border-radius: 16px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        h1 {

            margin-bottom: 30px;
        }

        .form-group {

            margin-bottom: 20px;
        }

        label {

            display: block;

            margin-bottom: 10px;

            font-weight: bold;
        }

        input,
        textarea,
        select {

            width: 100%;

            padding: 14px;

            border: 1px solid #ddd;

            border-radius: 10px;

            font-size: 15px;
        }

        textarea {

            height: 120px;
        }

        button {

            background: black;

            color: white;

            border: none;

            padding: 14px 24px;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            Add Job Application 🚀
        </h1>

        <form action="/applications/add"
              method="post">

            <div class="form-group">

                <label>
                    Company
                </label>

                <input type="text"
                       name="company"
                       required>

            </div>

            <div class="form-group">

                <label>
                    Position
                </label>

                <input type="text"
                       name="position"
                       required>

            </div>

            <div class="form-group">

                <label>
                    Status
                </label>

                <select name="status">

                    <option>
                        APPLIED
                    </option>

                    <option>
                        INTERVIEW
                    </option>

                    <option>
                        REJECTED
                    </option>

                    <option>
                        OFFER
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>
                    Notes
                </label>

                <textarea name="notes">
                </textarea>

            </div>

            <button type="submit">
                Save Application
            </button>

        </form>

    </div>

</div>

</body>

</html>
