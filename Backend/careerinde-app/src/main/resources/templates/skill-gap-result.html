<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        Skill Gap Result
    </title>

    <style>

        body {

            font-family: Arial;

            background: #f5f5f5;

            padding: 40px;
        }

        .container {

            max-width: 1000px;

            margin: auto;
        }

        .card {

            background: white;

            padding: 35px;

            border-radius: 16px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.08);

            margin-bottom: 25px;
        }

        h1 {

            margin-bottom: 20px;
        }

        .result-box {

            background: #fafafa;

            border: 1px solid #e5e5e5;

            border-radius: 12px;

            padding: 25px;

            white-space: pre-wrap;

            line-height: 1.8;

            font-size: 15px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            AI Skill Gap Analysis 🚀
        </h1>

        <div class="result-box"
             th:text="${result}">
        </div>

    </div>

</div>

</body>

</html>
